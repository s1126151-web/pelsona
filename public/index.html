<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>彼という人 - 三部作</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --line: #dddddd;
    --line-strong: #bbbbbb;
    --ink: #111111;
    --ink-soft: #666666;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans JP', sans-serif;
    background: #ffffff;
    color: var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 12px;
  }
  .stage{
    width:100%;
    max-width:720px;
    background: #ffffff;
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:520px;
  }
  .stage-inner{
    display:flex;
    flex-direction:column;
    flex:1;
    transition: opacity .5s ease;
  }
  .stage-inner.fading{ opacity:0; }

  .screen{ display:none; flex-direction:column; flex:1; }
  .screen.active{ display:flex; }

  @media (max-width: 480px){
    body{ padding:0; }
    .stage{ border-radius:0; border-left:none; border-right:none; min-height:100vh; }
    .chip{ padding:9px 14px; font-size:13px; }
    .primary-btn{ padding:13px 28px; }
  }

  /* ---- top bar ---- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    background: #ffffff;
    border-bottom:1px solid var(--line);
  }
  .chapter-block{ line-height:1.3; }
  .chapter-eyebrow{
    font-size:11px;
    letter-spacing:.14em;
    color: var(--ink-soft);
    font-weight:500;
  }
  .chapter-title{
    font-family:'Shippori Mincho', serif;
    font-size:19px;
    font-weight:700;
    color: var(--ink);
    margin-top:2px;
  }
  .his-age{
    font-size:12px;
    color: var(--ink-soft);
    margin-top:4px;
  }
  .his-age b{ color:var(--ink); font-weight:500; }

  .rewind-nav{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:6px 14px;
    border-bottom:1px solid var(--line);
    background:#fafafa;
  }
  .rewind-nav button{
    background:none;
    border:none;
    color:#bbbbbb;
    font-family:'Noto Sans JP', sans-serif;
    font-size:10px;
    letter-spacing:.05em;
    cursor:pointer;
    padding:2px 4px;
  }
  .rewind-nav button:hover{ color: var(--ink-soft); text-decoration:underline; }

  /* ---- 物語文(共通) ---- */
  .story-wrap{
    background:#ffffff;
    padding:22px 22px 4px;
    flex:1;
  }
  .story-panel{
    max-height:420px;
    overflow-y:auto;
    font-family:'Shippori Mincho', serif;
    font-size:15.5px;
    line-height:2.05;
    color: var(--ink);
    scroll-behavior:smooth;
  }
  .story-panel p{ margin:0 0 1.1em 0; }
  .story-panel p:last-child{ margin-bottom:0; }
  .story-panel .user-quote{ font-weight:700; }
  .story-panel .npc-quote{ font-weight:700; }
  .story-panel .bridge-text{ color: var(--ink-soft); }
  .story-panel::-webkit-scrollbar{ width:6px; }
  .story-panel::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:3px; }

  .inline-line{ display:inline; }
  .inline-editable{
    display:inline-block;
    min-width:2px;
    outline:none;
    border-bottom:1px dashed var(--line-strong);
    padding:0 2px;
  }
  .inline-editable:empty::before{
    content:attr(data-placeholder);
    color:#aaaaaa;
    font-weight:400;
  }
  .inline-editable:focus{ border-bottom-color: var(--ink); }
  .inline-hint{
    display:block;
    margin-top:6px;
    font-family:'Noto Sans JP', sans-serif;
    font-size:11px;
    color:#aaaaaa;
  }

  .typing-caret{
    display:inline-block;
    width:2px;
    height:1em;
    background:var(--ink);
    vertical-align:-2px;
    margin-left:1px;
    animation: blink 1s step-start infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ---- チャット下部：選択肢チップ + ステータス ---- */
  .bottom{ padding:6px 22px 18px; }
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; min-height:31px; align-items:flex-start; }
  .chip{
    font-family:'Noto Sans JP', sans-serif;
    font-size:12.5px;
    color: var(--ink-soft);
    background:#ffffff;
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 14px;
    cursor:pointer;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .chip:hover{ background:#f2f2f2; border-color:var(--ink); color:var(--ink); }
  .chip:disabled{ opacity:.4; cursor:default; }
  .chip:disabled:hover{ background:#ffffff; border-color:var(--line); color:var(--ink-soft); }

  .status-line{
    min-height:16px;
    font-size:12px;
    color: var(--ink-soft);
    margin-top:8px;
  }
  .status-line.is-error{ color:#111111; font-weight:500; }

  /* ---- タイトル / エピローグ ---- */
  .center-screen{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 28px;
    gap:18px;
  }
  .work-title{
    font-family:'Shippori Mincho', serif;
    font-size:26px;
    font-weight:700;
  }
  .work-intro, .epilogue-text{
    font-family:'Shippori Mincho', serif;
    font-size:14.5px;
    line-height:2;
    color: var(--ink-soft);
    max-width:440px;
  }
  .primary-btn{
    background: var(--ink);
    color:#ffffff;
    border:none;
    font-family:'Noto Sans JP', sans-serif;
    font-size:14px;
    font-weight:500;
    padding:11px 28px;
    border-radius:6px;
    cursor:pointer;
  }
  .primary-btn:hover{ filter:brightness(1.2); }
  .primary-btn:disabled{ opacity:.4; cursor:default; }

  .sr-only{
    position:absolute; width:1px; height:1px;
    padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="rewind-nav">
    <button type="button" id="navPart1">第一部</button>
    <button type="button" id="navPart2">第二部</button>
    <button type="button" id="navPart3">第三部</button>
  </div>
  <div class="stage-inner" id="stageInner">

    <h2 class="sr-only">彼という人物を、若い頃・人生の中盤・現在という3部構成で描く作品。各章は暗転で切り替わり、地の文はタイプライター演出で表示される。</h2>

    <!-- タイトル画面 -->
    <div class="screen" id="screenTitle">
      <div class="center-screen">
        <div class="work-title">彼という人（仮題）</div>
        <div class="work-intro">
          これは、一人の男を、異なる時代・異なる立場から見つめる物語です。<br>
          あなたが彼を変えられるかどうかを競う話ではありません。<br>
          変えようとすること、変わるもの、変わらないものを、静かに見届けてください。
        </div>
        <button class="primary-btn" id="startBtn" type="button">はじめる</button>
      </div>
    </div>

    <!-- 第一部・第三部の前に挟む、白背景の役割説明画面 -->
    <div class="screen" id="screenContext">
      <div class="center-screen">
        <div class="chapter-eyebrow" id="contextEyebrow"></div>
        <div class="work-intro" id="contextText"></div>
        <button class="primary-btn" id="contextContinueBtn" type="button">はじめる</button>
      </div>
    </div>

    <!-- 第一部・第三部 共通：チャット画面 -->
    <div class="screen" id="screenChat">
      <div class="topbar">
        <div class="chapter-block">
          <div class="chapter-eyebrow" id="chapterEyebrow"></div>
          <div class="chapter-title" id="chapterTitle"></div>
          <div class="his-age" id="hisAgeLine"></div>
        </div>
      </div>

      <div class="story-wrap">
        <div class="story-panel" id="storyPanel"></div>
      </div>

      <div class="bottom">
        <div class="chip-row" id="chipRow"></div>
        <div class="status-line" id="statusLine"></div>
      </div>
    </div>

    <!-- 第二部：自動再生の帯（タイプライターで積み重なる固定演出） -->
    <div class="screen" id="screenSlides">
      <div class="topbar">
        <div class="chapter-block">
          <div class="chapter-eyebrow">第二部</div>
        </div>
      </div>
      <div class="story-wrap">
        <div class="story-panel" id="slidePanel"></div>
      </div>
    </div>

    <!-- エピローグ -->
    <div class="screen" id="screenEpilogue">
      <div class="center-screen">
        <div class="chapter-eyebrow">エピローグ</div>
        <div class="epilogue-text" id="epilogueText"></div>
        <button class="primary-btn" id="restartBtn" type="button" disabled>タイトルへ戻る</button>
      </div>
    </div>

  </div>
</div>

<script>
  /**
   * 以下のテキスト類（タイトル導入文・各章の冒頭/選択肢・第二部の原稿・
   * エピローグ）はプレースホルダーです。実際の文章が固まったら書き換えてください。
   * 骨格（フェーズ遷移・AIの終了判定・タイプライター演出）自体は変更不要です。
   */

  const CHAT_CONFIG = {
    young: {
      eyebrow: '第一部',
      title: '学生だった過去',
      age: '18歳',
      contextText: 'あなたは、彼の父親です。彼はもともと学校で成績優秀な生徒でしたが、進路の話が重なるにつれて、勉強から距離を置くようになりました。今日、彼が持ち帰ったのは、真っ赤な点数の並んだ答案でした。',
      intro: [
        { text: '玄関先で、彼は鞄から丸めた答案用紙を取り出した。広げると、以前とは見違えるほど低い点数が並んでいる。' },
        { text: '「……あー、まあ、うん。」', quote: true },
        { text: '彼はそう言って、気まずそうに目をそらした。かつて近所の人に「一度言えば覚える」と肩を叩かれていた頃の面影は、もうそこにはなかった。' },
      ],
      choices: [
        'また赤点？いい加減にしなさい。',
        'このままで、将来どうするつもり?',
        '……この点数、説明してもらえる?',
      ],
    },
    present: {
      eyebrow: '第三部',
      title: '父親である現在',
      age: '67歳',
      contextText: 'あなたは、父親である彼の、大人になった息子です。母親は父親の仕事を手伝っていましたが、仕事の進め方を巡って言い合いになり、たった今、夫婦喧嘩をしたばかりです。あなたは作業場にいる父親のもとを訪れ、何かを言おうとしています。',
      intro: [
        { text: '作業場に入ると、彼は喧嘩のことなど無かったかのように、手元の作業を続けていた。' },
        { text: '「ちょうどいい、そこ持っててくれ」', quote: true },
        { text: '彼はそう言うと、返事を待たずに部品を差し出した。' },
      ],
      choices: [
        '母さんに、あんな言い方しなくてもいいでしょ。',
        '少しは自分の言い方、考えたら?',
        '……いつまでそうやってるつもり?',
      ],
    },
  };

  // 第二部：固定演出の原稿。重要な出来事だけをピックアップしている。
  // pause: この行のあと、次の行までどれくらい間を置くか(ms)。重要な行ほど長くする。
  // pause: この行のあと、次の行までどれくらい間を置くか(ms)。重要な行ほど長くする。
  // speed: タイプする速さ(ms/文字)。省略時は28。重要な行だけゆっくりにする。
  const PART2_LINES = [
    { text: '――それから、彼の人生は続いていった。――', pause: 900 },
    { text: '彼は、周囲に合わせることをやめ、自分がやりたいことだけを仕事にして生きていくことを選んだ。', pause: 900 },
    { text: 'そうして、今の暮らしを築いていった。', pause: 1400 },
    { text: 'やがて結婚し、息子が生まれた。', pause: 1400 },
    { text: '幼い息子を作業場に連れていき、木くずを掃かせ、端材で好きなものを作らせた。', pause: 1200 },
    { text: 'だが、息子が自分の部屋でゲームに没頭する時間が増えるほど、彼は苛立ちを募らせていった。', pause: 1400 },
    { text: 'ある夜、彼はゲーム機を取り上げ、抵抗する息子に手を上げてしまった。', pause: 4000, speed: 60 },
    { text: 'その日を境に、息子は父親の前で自分の好きなものを話さなくなった。', pause: 1400 },
    { text: '息子が家を出ていくときも、彼はただ「好きにすればいい」とだけ言った。', pause: 900 },
  ];

  const EPILOGUE_TEXT =
    '彼は変わった。けれど、変わらなかった。\nその両方が、たしかに彼だった。';

  function escapeHtml(str){
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  // 指定した要素の中に、1文字ずつタイプするように文字を追加していく
  function typeInto(el, text, speed){
    return new Promise(resolve => {
      let i = 0;
      const caret = document.createElement('span');
      caret.className = 'typing-caret';
      el.appendChild(caret);
      const scrollParent = el.closest('.story-panel');
      const timer = setInterval(() => {
        if (i < text.length){
          caret.insertAdjacentText('beforebegin', text[i]);
          i += 1;
          if (scrollParent) scrollParent.scrollTop = scrollParent.scrollHeight;
        } else {
          clearInterval(timer);
          caret.remove();
          resolve();
        }
      }, speed || 30);
    });
  }

  // ------------------------------------------------------------
  // フェーズ管理
  // ------------------------------------------------------------
  const screens = {
    title: document.getElementById('screenTitle'),
    context: document.getElementById('screenContext'),
    chat: document.getElementById('screenChat'),
    slides: document.getElementById('screenSlides'),
    epilogue: document.getElementById('screenEpilogue'),
  };

  function showScreenImmediate(key){
    Object.values(screens).forEach(el => el.classList.remove('active'));
    screens[key].classList.add('active');
  }

  function transitionTo(key, setupFn, delay){
    const inner = document.getElementById('stageInner');
    inner.classList.add('fading');
    setTimeout(() => {
      if (setupFn) setupFn();
      showScreenImmediate(key);
      inner.classList.remove('fading');
    }, delay || 550);
  }

  // ------------------------------------------------------------
  // 第一部・第三部共通のチャットロジック
  // ------------------------------------------------------------
  const chatState = {
    mode: null,          // 'young' | 'present'
    history: [],
    progress: null,      // 第三部だけで使う進捗(サーバーから返ってきた値をそのまま保持)
    currentChoices: [],  // 直近でAIから受け取った選択肢(なければconfig.choicesにフォールバック)
    busy: false,
    ended: false,
    onComplete: null,
  };

  // 第一部でユーザー(親役)が実際に言った言葉。第三部の現在地テンプレートへ参考として渡す。
  // タイトルへ戻ったらリセットする。
  let part1UserLines = [];

  const active = { editableEl: null, hintEl: null, lineWrapperEl: null };

  function appendEmptyParagraph(){
    const panel = document.getElementById('storyPanel');
    const p = document.createElement('p');
    panel.appendChild(p);
    panel.scrollTop = panel.scrollHeight;
    return p;
  }

  async function typeParagraphInto(panelId, entry){
    const panel = document.getElementById(panelId);
    const p = document.createElement('p');
    if (entry.className) p.className = entry.className;
    panel.appendChild(p);
    let target = p;
    if (entry.quote){
      const span = document.createElement('span');
      span.className = 'npc-quote';
      p.appendChild(span);
      target = span;
    }
    panel.scrollTop = panel.scrollHeight;
    await typeInto(target, entry.text, 30);
    panel.scrollTop = panel.scrollHeight;
    return p;
  }

  function setStatus(text, isError){
    const el = document.getElementById('statusLine');
    el.textContent = text || '';
    el.classList.toggle('is-error', !!isError);
  }

  function renderChipRow(choiceTexts){
    const wrap = document.getElementById('chipRow');
    wrap.innerHTML = '';
    (choiceTexts || []).forEach(text => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.dataset.line = text;
      btn.textContent = text;
      btn.addEventListener('click', () => fillActiveEditable(text));
      wrap.appendChild(btn);
    });
  }

  function setChipsDisabled(disabled){
    document.querySelectorAll('.chip').forEach(b => b.disabled = disabled);
  }

  function fillActiveEditable(text){
    if (!active.editableEl || chatState.busy || chatState.ended) return;
    active.editableEl.textContent = text;
    active.editableEl.focus();
    const range = document.createRange();
    range.selectNodeContents(active.editableEl);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function startNewTurn(){
    const p = document.createElement('p');

    const lineWrapper = document.createElement('span');
    lineWrapper.className = 'inline-line';

    const editable = document.createElement('span');
    editable.className = 'inline-editable';
    editable.contentEditable = 'true';
    editable.setAttribute('data-placeholder', 'ここに続きを書く…');

    lineWrapper.appendChild(document.createTextNode('「'));
    lineWrapper.appendChild(editable);
    lineWrapper.appendChild(document.createTextNode('」'));

    const hint = document.createElement('span');
    hint.className = 'inline-hint';
    hint.textContent = 'Enterで伝える';

    p.appendChild(lineWrapper);
    p.appendChild(hint);

    const panel = document.getElementById('storyPanel');
    panel.appendChild(p);
    panel.scrollTop = panel.scrollHeight;

    active.editableEl = editable;
    active.hintEl = hint;
    active.lineWrapperEl = lineWrapper;

    editable.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const text = editable.textContent.trim();
        if (text) sendMessage(text);
      }
    });

    renderChipRow(chatState.currentChoices);
    editable.focus();
  }

  function finalizeActiveTurn(text){
    if (!active.lineWrapperEl) return;
    active.lineWrapperEl.innerHTML = `「${escapeHtml(text)}」`;
    active.lineWrapperEl.classList.add('user-quote');
    if (active.hintEl) active.hintEl.remove();
    active.editableEl = null;
    active.hintEl = null;
    active.lineWrapperEl = null;
    renderChipRow([]);
  }

  function clearActiveTurn(){
    if (active.hintEl) active.hintEl.remove();
    if (active.editableEl) active.editableEl.contentEditable = 'false';
    active.editableEl = null;
    active.hintEl = null;
    active.lineWrapperEl = null;
    renderChipRow([]);
  }

  // mode: 'young' | 'present', onComplete: この章が終わったら呼ばれる関数
  async function startChatPart(mode, onComplete){
    const config = CHAT_CONFIG[mode];

    chatState.mode = mode;
    chatState.history = [];
    chatState.progress = mode === 'present' ? null : null; // 初回はnull(サーバー側で初期値扱い)
    chatState.currentChoices = config.choices;
    chatState.busy = false;
    chatState.ended = false;
    chatState.onComplete = onComplete;

    document.getElementById('chapterEyebrow').textContent = config.eyebrow;
    document.getElementById('chapterTitle').textContent = config.title;
    document.getElementById('hisAgeLine').innerHTML = `彼の年齢：<b>${escapeHtml(config.age)}</b>`;
    setStatus('', false);

    const panel = document.getElementById('storyPanel');
    panel.innerHTML = '';
    renderChipRow([]);

    for (const entry of config.intro) {
      await typeParagraphInto('storyPanel', entry);
      await sleep(250);
    }

    startNewTurn();
  }

  async function sendMessage(trimmed){
    if (chatState.busy || chatState.ended) return;

    chatState.busy = true;
    setChipsDisabled(true);
    setStatus('少し考えている……', false);

    finalizeActiveTurn(trimmed);

    try {
      const body = {
        message: trimmed,
        history: chatState.history,
        mode: chatState.mode,
      };
      if (chatState.progress) body.progress = chatState.progress;
      if (chatState.mode === 'present' && part1UserLines.length > 0) {
        body.part1Reference = part1UserLines.join(' / ');
      }

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) throw new Error('response not ok');

      const data = await res.json();
      if (!data || typeof data.dialogue !== 'string') throw new Error('invalid payload');

      chatState.history.push({ role: 'user', content: trimmed });
      chatState.history.push({ role: 'assistant', content: data.dialogue });
      if (data.progress) chatState.progress = data.progress;
      if (Array.isArray(data.choices) && data.choices.length > 0) {
        chatState.currentChoices = data.choices;
      }
      if (chatState.mode === 'young') {
        part1UserLines.push(trimmed);
      }

      setStatus('', false);

      const p = appendEmptyParagraph();
      if (data.narration) {
        await typeInto(p, data.narration, 26);
        p.appendChild(document.createElement('br'));
      }
      const quote = document.createElement('span');
      quote.className = 'npc-quote';
      p.appendChild(quote);
      document.getElementById('storyPanel').scrollTop = document.getElementById('storyPanel').scrollHeight;
      await typeInto(quote, `「${data.dialogue}」`, 26);
      document.getElementById('storyPanel').scrollTop = document.getElementById('storyPanel').scrollHeight;

      if (data.sceneComplete) {
        finishChatPart();
        return;
      }
    } catch (err) {
      console.error(err);
      setStatus('返事が途切れた。もう一度伝えてください', true);
    } finally {
      chatState.busy = false;
      if (!chatState.ended) startNewTurn();
    }
  }

  async function finishChatPart(){
    if (chatState.ended) return;
    chatState.ended = true;
    clearActiveTurn();
    setStatus('', false);
    const onComplete = chatState.onComplete;
    await sleep(3000);
    if (onComplete) onComplete();
  }

  // ------------------------------------------------------------
  // 第二部：自動再生の帯（タイプライターで積み重なる固定演出）
  // ------------------------------------------------------------
  async function runSlides(onComplete){
    const panel = document.getElementById('slidePanel');
    panel.innerHTML = '';

    for (const line of PART2_LINES) {
      const p = document.createElement('p');
      p.className = 'bridge-text';
      panel.appendChild(p);
      panel.scrollTop = panel.scrollHeight;
      await typeInto(p, line.text, line.speed || 28);
      panel.scrollTop = panel.scrollHeight;
      await sleep(line.pause || 500);
    }

    await sleep(3000);
    onComplete();
  }

  // ------------------------------------------------------------
  // 全体のフェーズの流れ
  // ------------------------------------------------------------
  function goTitle(){
    part1UserLines = [];
    transitionTo('title', null, 300);
  }

  function goPart1(){
    transitionTo('context', () => {
      const config = CHAT_CONFIG.young;
      document.getElementById('contextEyebrow').textContent = config.eyebrow;
      document.getElementById('contextText').textContent = config.contextText;
      const btn = document.getElementById('contextContinueBtn');
      btn.textContent = 'はじめる';
      btn.onclick = () => transitionTo('chat', () => startChatPart('young', goPart2), 550);
    }, 550);
  }

  function goPart2(){
    transitionTo('slides', () => runSlides(goPart3), 550);
  }

  function goPart3(){
    transitionTo('context', () => {
      const config = CHAT_CONFIG.present;
      document.getElementById('contextEyebrow').textContent = config.eyebrow;
      document.getElementById('contextText').textContent = config.contextText;
      const btn = document.getElementById('contextContinueBtn');
      btn.textContent = 'はじめる';
      btn.onclick = () => transitionTo('chat', () => startChatPart('present', goEpilogue), 550);
    }, 550);
  }

  function goEpilogue(){
    transitionTo('epilogue', async () => {
      const el = document.getElementById('epilogueText');
      el.textContent = '';
      const restartBtn = document.getElementById('restartBtn');
      restartBtn.disabled = true;
      const lines = EPILOGUE_TEXT.split('\n');
      for (let i = 0; i < lines.length; i++) {
        if (i > 0) el.appendChild(document.createElement('br'));
        await typeInto(el, lines[i], 30);
        await sleep(300);
      }
      restartBtn.disabled = false;
    }, 550);
  }

  document.getElementById('startBtn').addEventListener('click', goPart1);
  document.getElementById('restartBtn').addEventListener('click', goTitle);

  // 巻き戻しナビ：いつでも直接、指定の部へジャンプできる
  document.getElementById('navPart1').addEventListener('click', () => {
    part1UserLines = [];
    goPart1();
  });
  document.getElementById('navPart2').addEventListener('click', goPart2);
  document.getElementById('navPart3').addEventListener('click', goPart3);

  showScreenImmediate('title');
</script>
</body>
</html>
